<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stack — RSS Reader</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23f5f5f5'/><text x='16' y='24' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='22' fill='%231a1a1a'>S</text></svg>">
  <link rel="stylesheet" href="/theme.css?v=__VERSION__">
  <link rel="stylesheet" href="style.css?v=__VERSION__">
</head>

<body>
  <div id="login-screen" class="hidden">
    <form id="login-form" action="/api/login" method="post">
      <h1>Stack</h1>
      <label for="login-username" class="sr-only">Username</label>
      <input type="text" id="login-username" name="username" placeholder="Username" autocomplete="username" required>
      <label for="login-password" class="sr-only">Password</label>
      <input type="password" id="login-password" name="password" placeholder="Password" autocomplete="current-password"
        required>
      <button type="submit">Sign in</button>
      <p id="login-error" class="login-error"></p>
    </form>
  </div>

  <div id="app" class="hidden">
    <aside id="sidebar">
      <header class="sidebar-header">
        <h1>Stack</h1>
        <button id="btn-all-entries" title="All entries">All</button>
      </header>
      <nav id="feed-tree"></nav>
      <div class="sidebar-footer">
        <button id="btn-settings" class="sidebar-footer-btn" title="Settings">Settings</button>
        <button id="btn-logout" class="sidebar-footer-btn" title="Sign out">Sign out</button>
      </div>
    </aside>

    <main id="entry-list">
      <header id="entry-list-header">
        <button id="btn-back-feeds" class="btn-back" aria-label="Back to feeds">← Feeds</button>
        <h2 id="entry-list-title">All Entries</h2>
      </header>
      <div id="entries"></div>
    </main>

    <article id="entry-content">
      <div id="entry-empty">Select an entry to read</div>
      <div id="entry-view" class="hidden">
        <header id="entry-header">
          <button id="btn-back-entries" class="btn-back" aria-label="Back to entries">← Back</button>
          <h2 id="entry-title"></h2>
          <div id="entry-meta">
            <span id="entry-feed-name"></span>
            <time id="entry-date"></time>
          </div>
          <div id="entry-actions">
            <button id="btn-toggle-read">Mark as read</button>
            <button id="btn-toggle-star">★ Star</button>
            <a id="btn-open-original" href="#" target="_blank" rel="noopener">Open original</a>
            <button id="btn-fullscreen" title="Fullscreen reader (F)">Fullscreen</button>
          </div>
        </header>
        <div id="entry-body"></div>
      </div>
    </article>

    <div id="settings-panel" class="hidden">
      <header class="settings-header">
        <h2>Settings</h2>
        <button id="btn-close-settings">✕</button>
      </header>
      <div class="settings-body">
        <section class="settings-section">
          <h3>Display</h3>
          <div class="settings-row" style="align-items: center;">
            <label for="select-text-size" style="font-size: 13px;">Text size</label>
            <select id="select-text-size">
              <option value="normal">Normal</option>
              <option value="large">Large</option>
              <option value="extra-large">Extra Large</option>
            </select>
          </div>
        </section>
        <section class="settings-section">
          <h3>Add feed</h3>
          <div class="settings-row">
            <input type="text" id="add-feed-url" placeholder="Feed or website URL">
            <select id="add-feed-category"></select>
            <button id="btn-add-feed">Add</button>
          </div>
          <p id="add-feed-status" class="settings-status"></p>
        </section>
        <section class="settings-section">
          <h3>Feeds</h3>
          <div id="settings-feed-list"></div>
        </section>
        <section class="settings-section">
          <h3>Categories</h3>
          <div class="settings-row">
            <input type="text" id="add-category-title" placeholder="New category name">
            <button id="btn-add-category">Add</button>
          </div>
          <div id="settings-category-list"></div>
        </section>
      </div>
    </div>
  </div>

  <script src="app.js?v=__VERSION__"></script>
</body>

</html>
